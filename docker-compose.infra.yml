# Infraestrutura IZING — PostgreSQL e Redis (padrão); RabbitMQ opcional.
# Backend e frontend rodam nativamente (PM2 / Node), NÃO neste compose.
#
# Uso:
#   docker compose -f docker-compose.infra.yml up -d
#     → só PostgreSQL + Redis (suficiente para WhatsApp Baileys)
#   docker compose -f docker-compose.infra.yml --profile rabbitmq up -d
#     → + RabbitMQ (WABA360 / Messenger)
#   docker compose -f docker-compose.infra.yml --profile tools up -d
#     → + Portainer
#
# Credenciais padrão (altere em produção):
#   Postgres: izing / 123@mudar  — porta 5432
#   Redis:    senha 123@mudar     — porta 6379
#   RabbitMQ: admin / 123@mudar   — portas 5672 (AMQP) e 15672 (painel)

services:
  postgresql:
    image: postgres:14
    container_name: postgresql
    restart: always
    environment:
      POSTGRES_USER: izing
      POSTGRES_PASSWORD: "123@mudar"
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - ${IZING_DATA_DIR:-./.data}/pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U izing"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-izing:
    image: redis:alpine
    container_name: redis-izing
    restart: always
    environment:
      TZ: America/Sao_Paulo
    command: redis-server --appendonly yes --requirepass "123@mudar"
    ports:
      - "6379:6379"
    volumes:
      - ${IZING_DATA_DIR:-./.data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123@mudar", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    profiles: ["rabbitmq"]
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    hostname: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: "123@mudar"
      TZ: America/Sao_Paulo
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ${IZING_DATA_DIR:-./.data}/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  portainer:
    profiles: ["tools"]
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
