# Infraestrutura local (PostgreSQL, Redis, RabbitMQ).
# Backend roda fora do Docker — veja docker-compose.infra.yml na raiz do repositório.
#
# Uso legado (equivalente):
#   docker compose up -d

services:
  redis:
    container_name: redis-izing
    image: redis:alpine
    restart: always
    command: redis-server --appendonly yes --requirepass "123@mudar"
    ports:
      - "6379:6379"
    volumes:
      - "../.data/redis:/data"

  postgres:
    image: postgres:14
    restart: always
    container_name: postgresql
    environment:
      POSTGRES_USER: izing
      POSTGRES_PASSWORD: "123@mudar"
      POSTGRES_DB: postgres
      TZ: America/Sao_Paulo
    volumes:
      - "../.data/pg:/var/lib/postgresql/data"
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    hostname: rabbitmq
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: "123@mudar"
    volumes:
      - "../.data/rabbitmq:/var/lib/rabbitmq"
    ports:
      - "5672:5672"
      - "15672:15672"
